version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: naim
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: naim
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naim"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "18795:8000"
    environment:
      DATABASE_URL: postgresql://naim:${DB_PASSWORD}@db:5432/naim
      API_KEYS_RAW: ${API_KEYS_RAW}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build: .
    restart: unless-stopped
    ports:
      - "18796:8001"
    command: ["python", "-m", "app.mcp.server", "--sse", "--port", "8001"]
    environment:
      NAIM_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
